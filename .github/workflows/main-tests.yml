---
name: Main Tests
on:
  push:
    branches: [main]
jobs:
  server-test:
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Install Go
      uses: actions/setup-go@v5
      with:
        go-version: stable
    - name: Install libgstreamer1.0-dev
      run: |
        sudo apt-get update -y
        sudo apt-get install -y --no-install-recommends libgstreamer1.0-dev
    - name: Run Tests
      run: go test -v -count 2 -race ./...
  client-build:
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Install Node
      uses: actions/setup-node@v4
      with:
        node-version: 24.x
    - name: Install Packages
      run: cd client && npm clean-install
    - name: Build Client
      run: cd client && npm run build
    - name: Check for Prettier Style
      run: cd client && npm exec prettier -- --check src
    - name: Check for ESLint Violations
      run: cd client && npm exec eslint -- .
