---
name: Publish Image
on:
  workflow_run:
    workflows: [Main Tests]
    types: [completed]
    branches: [main]
jobs:
  publish:
    runs-on: ubuntu-24.04
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
      id: setup-buildx
    - name: Configure BuildKit cache
      uses: actions/cache@v6
      id: buildkit-cache
      with:
        key: buildkit-cache-mounts-${{ hashFiles('Dockerfile') }}
        path: buildkit-cache-mounts
    - name: Inject BuildKit cache
      uses: reproducible-containers/buildkit-cache-dance@v3
      with:
        cache-dir: buildkit-cache-mounts
        builder: ${{ steps.setup-buildx.outputs.name }}
        skip-extraction: ${{ steps.buildkit-cache.outputs.cache-hit }}
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build and Push
      uses: docker/build-push-action@v7
      with:
        push: true
        tags: ghcr.io/${{ github.repository }}:latest
        platforms: |
          linux/amd64
          linux/arm64
        cache-from: type=gha
        cache-to: type=gha,mode=max
