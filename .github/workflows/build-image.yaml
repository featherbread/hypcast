---
name: Build Image (without publishing)
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      id: setup-buildx
    - name: Configure BuildKit cache
      uses: actions/cache@v4
      id: buildkit-cache
      with:
        key: buildkit-cache-mounts-${{ hashFiles('Dockerfile') }}
        path: buildkit-cache-mounts
    - name: Inject BuildKit cache
      uses: reproducible-containers/buildkit-cache-dance@6f699a72a59e4252f05a7435430009b77e25fe06
      with:
        cache-dir: buildkit-cache-mounts
        builder: ${{ steps.setup-buildx.outputs.name }}
        skip-extraction: ${{ steps.buildkit-cache.outputs.cache-hit }}
    - name: Build Image
      uses: docker/build-push-action@v5
      with:
        push: false
        platforms: |
          linux/amd64
          linux/arm64
        cache-from: type=gha
        cache-to: type=gha,mode=max
